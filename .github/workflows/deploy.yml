name: Update Dashboard

on:
  # Run every weekday at 9:30 PM IST (16:00 UTC)
  # Gives 6 hours of buffer after market close (3:30 PM IST) for data to settle
  schedule:
    - cron: '0 16 * * 1-5'

  # Manual trigger from the Actions tab — useful for immediate refresh
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 3. Restore cached market data ────────────────────────────────────────
      # Cache key includes the day so the cache is always refreshed with today's
      # incremental data and saved back at the end of the run.
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v4
        with:
          path: |
            Data/
            NIFTY/
            SENSEX/
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      # ── 4. Download spot data ────────────────────────────────────────────────
      # Incremental — only fetches rows newer than the last cached row.
      # First run: downloads from Jan 2024 (~5-10 min).
      # Subsequent runs: downloads only the last day or two (~30 sec).
      - name: Download NIFTY + SENSEX spot data
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
        run: python download_spot.py

      # ── 5. Generate dashboard HTML ───────────────────────────────────────────
      # straddle_dashboard.py also:
      #   - downloads daily candles (for gap calculation)
      #   - auto-downloads any missing 0DTE option contracts
      #   - writes straddle_dashboard.html
      - name: Generate straddle_dashboard.html
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
        run: python straddle_dashboard.py

      # ── 6. Verify output ─────────────────────────────────────────────────────
      - name: Verify HTML was generated
        run: |
          if [ ! -f straddle_dashboard.html ]; then
            echo "ERROR: straddle_dashboard.html was not generated"
            exit 1
          fi
          size=$(wc -c < straddle_dashboard.html)
          echo "straddle_dashboard.html generated — ${size} bytes"

      # ── 7. Stage HTML for deployment ─────────────────────────────────────────
      # Copy only the HTML into a clean public/ folder so no source files
      # (Python scripts, requirements.txt, etc.) end up on the live site.
      # Naming it index.html means the root URL works without /straddle_dashboard.html
      - name: Stage for deployment
        run: |
          mkdir -p public
          cp straddle_dashboard.html public/index.html

      # ── 8. Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          commit_message: |
            chore: refresh dashboard [${{ github.run_id }}]

            Generated by ${{ github.workflow }} on ${{ github.ref_name }}
            Triggered by: ${{ github.event_name }}

      # ── 9. Save updated data back to cache ───────────────────────────────────
      # Even on failure, we want to preserve whatever data was downloaded
      # so the next run starts from a further point.
      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            Data/
            NIFTY/
            SENSEX/
          key: market-data-${{ runner.os }}-${{ github.run_id }}
