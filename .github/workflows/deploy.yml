name: Update Dashboard

on:
  # Run every weekday at 9:30 PM IST (16:00 UTC)
  schedule:
    - cron: '0 16 * * 1-5'

  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # first run downloads ~1800 contracts; cached runs take <5 min

    permissions:
      contents: write      # cache save/restore
      pages: write         # deploy to GitHub Pages
      id-token: write      # required by actions/deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 3. Restore cached market data ────────────────────────────────────────
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v4
        with:
          path: |
            Data/
            NIFTY/
            SENSEX/
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      # ── 4. Download spot data ────────────────────────────────────────────────
      - name: Download NIFTY + SENSEX spot data
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
        run: python download_spot.py

      # ── 5. Pre-download all 0DTE contracts ──────────────────────────────────
      # Downloads ATM ± 15 strikes for all 90 expiries so straddle_dashboard.py
      # reads from disk rather than making inline API calls — much faster HTML
      # generation. Cached between runs so only the new expiry is fetched.
      - name: Pre-download 0DTE contracts
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
        run: python download_0dte.py

      # ── 6. Generate dashboard HTML ───────────────────────────────────────────
      - name: Generate straddle_dashboard.html
        env:
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
        run: python straddle_dashboard.py

      # ── 7. Verify output ─────────────────────────────────────────────────────
      - name: Verify HTML was generated
        run: |
          if [ ! -f straddle_dashboard.html ]; then
            echo "ERROR: straddle_dashboard.html was not generated"
            exit 1
          fi
          size=$(wc -c < straddle_dashboard.html)
          echo "straddle_dashboard.html generated — ${size} bytes"

      # ── 7. Stage for Pages ───────────────────────────────────────────────────
      # Only the HTML goes live — no Python source files exposed.
      # index.html means the root URL works cleanly (no /straddle_dashboard.html).
      - name: Stage for deployment
        run: |
          mkdir -p public
          cp straddle_dashboard.html public/index.html

      # ── 8. Upload Pages artifact ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      # ── 9. Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # ── 10. Save updated data back to cache ──────────────────────────────────
      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            Data/
            NIFTY/
            SENSEX/
          key: market-data-${{ runner.os }}-${{ github.run_id }}
